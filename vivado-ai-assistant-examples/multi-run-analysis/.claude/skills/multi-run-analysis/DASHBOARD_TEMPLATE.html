<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Run Implementation Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #242836; --border: #2e3347;
    --text: #e1e4ed; --text-dim: #8b90a0; --accent: #6c9eff; --green: #4ade80;
    --red: #f87171; --amber: #fbbf24; --purple: #a78bfa; --cyan: #22d3ee;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: var(--bg); color: var(--text); line-height: 1.5; padding: 24px; }
  h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
  h2 { font-size: 1.15rem; font-weight: 600; margin-bottom: 12px; color: var(--accent); }
  .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 20px; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
  .header-left { flex: 1; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
  .badge-green { background: rgba(74,222,128,.15); color: var(--green); }
  .badge-red { background: rgba(248,113,113,.15); color: var(--red); }
  .badge-amber { background: rgba(251,191,36,.15); color: var(--amber); }
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; }
  .kpi-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: .05em; }
  .kpi-value { font-size: 1.8rem; font-weight: 700; margin-top: 4px; }
  .kpi-sub { font-size: 0.8rem; color: var(--text-dim); margin-top: 2px; }
  .kpi-value.green { color: var(--green); }
  .kpi-value.red { color: var(--red); }
  .kpi-value.amber { color: var(--amber); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 1200px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .card-full { margin-bottom: 24px; }
  .chart-container { position: relative; width: 100%; }
  .chart-container canvas { max-height: 400px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th { text-align: left; padding: 8px 10px; color: var(--text-dim); font-weight: 600;
       border-bottom: 2px solid var(--border); font-size: 0.75rem; text-transform: uppercase; letter-spacing: .03em; }
  td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
  tr:hover { background: var(--surface2); }
  tr.winner { background: rgba(74,222,128,.06); }
  tr.winner td:first-child { border-left: 3px solid var(--green); }
  .num { font-variant-numeric: tabular-nums; text-align: right; }
  .neg { color: var(--red); }
  .pos { color: var(--green); }
  .avoid { color: var(--red); font-weight: 600; }
  .good { color: var(--green); font-weight: 600; }
  .device-map { display: flex; flex-direction: column; gap: 2px; max-width: 320px; margin: 0 auto; }
  .slr-box { border: 2px solid var(--border); border-radius: 8px; padding: 10px 14px; }
  .slr-box:first-child { border-top-left-radius: 12px; border-top-right-radius: 12px; }
  .slr-box:last-child { border-bottom-left-radius: 12px; border-bottom-right-radius: 12px; }
  .slr-label { font-size: 0.7rem; font-weight: 700; color: var(--text-dim); margin-bottom: 6px; }
  .slr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .slr-val { font-size: 0.78rem; font-variant-numeric: tabular-nums; }
  .slr-val.hot { color: var(--red); font-weight: 700; }
  .slr-val.warm { color: var(--amber); font-weight: 600; }
  .slr-val.cool { color: var(--green); }
  .tab-bar { display: flex; gap: 2px; margin-bottom: 16px; border-bottom: 2px solid var(--border); }
  .tab { padding: 8px 16px; cursor: pointer; font-size: 0.82rem; font-weight: 500; color: var(--text-dim);
         border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .anomaly-item { padding: 10px 14px; border-left: 3px solid var(--amber); background: var(--surface2);
                  border-radius: 0 8px 8px 0; margin-bottom: 8px; font-size: 0.85rem; }
  .anomaly-item.critical { border-left-color: var(--red); }
  .anomaly-item.info { border-left-color: var(--accent); }
  .next-step { padding: 10px 14px; border-left: 3px solid var(--accent); background: var(--surface2);
               border-radius: 0 8px 8px 0; margin-bottom: 8px; font-size: 0.85rem; }
  .next-step strong { color: var(--accent); }
  .run-detail-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.65); z-index:100; justify-content:center; align-items:center; }
  .run-detail-overlay.open { display:flex; }
  .run-detail-panel { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:28px 32px; max-width:820px; width:95%; max-height:85vh; overflow-y:auto; position:relative; }
  .run-detail-panel h2 { margin-bottom:16px; }
  .run-detail-close { position:absolute; top:14px; right:18px; cursor:pointer; font-size:1.4rem; color:var(--text-dim); background:none; border:none; }
  .run-detail-close:hover { color:var(--text); }
  .phase-block { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px 18px; margin-bottom:12px; }
  .phase-label { font-size:0.72rem; font-weight:700; color:var(--accent); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
  .phase-cmd { font-family:'Fira Code','Cascadia Code','Consolas',monospace; font-size:0.82rem; color:var(--cyan); background:var(--bg); padding:8px 12px; border-radius:6px; word-break:break-all; }
  .phase-metrics { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:8px; margin-top:8px; }
  .phase-metric { font-size:0.78rem; }
  .phase-metric-label { color:var(--text-dim); font-size:0.7rem; }
  .pattern-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:12px; }
  .pattern-card.adopt { border-left:4px solid var(--green); }
  .pattern-card.avoid { border-left:4px solid var(--red); }
  .pattern-card.observation { border-left:4px solid var(--amber); }
  .pattern-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .pattern-phase { font-size:0.7rem; background:var(--surface2); padding:2px 8px; border-radius:8px; color:var(--text-dim); }
  .pattern-verdict { font-size:0.75rem; font-weight:700; padding:2px 10px; border-radius:10px; }
  .pattern-verdict.adopt { background:rgba(74,222,128,.15); color:var(--green); }
  .pattern-verdict.avoid { background:rgba(248,113,113,.15); color:var(--red); }
  .pattern-evidence { font-size:0.82rem; color:var(--text-dim); margin-top:6px; line-height:1.6; }
  .pattern-freq { font-size:0.78rem; color:var(--text); margin-top:4px; }
  .clickable-row { cursor:pointer; }
  .clickable-row:hover { background:var(--surface2) !important; }
  .detail-cong-table { width:100%; border-collapse:collapse; font-size:.78rem; margin-top:8px; }
  .detail-cong-table th { text-align:left; padding:5px 8px; color:var(--text-dim); font-size:.7rem; text-transform:uppercase; border-bottom:2px solid var(--border); }
  .detail-cong-table td { padding:4px 8px; border-bottom:1px solid var(--border); font-variant-numeric:tabular-nums; }
  .detail-cong-table td.hot { color:var(--red); font-weight:700; }
  .detail-cong-table td.warm { color:var(--amber); font-weight:600; }
  .module-bar { height:16px; background:var(--accent); border-radius:3px; min-width:2px; }
  .footer { text-align: center; color: var(--text-dim); font-size: 0.72rem; margin-top: 32px;
            padding-top: 16px; border-top: 1px solid var(--border); }
</style>
</head>
<body>
<div id="app">Loading data...</div>
<script>
async function loadData() {
  try {
    const resp = await fetch('report_data.json');
    if (!resp.ok) throw new Error('Could not load report_data.json');
    return await resp.json();
  } catch (e) {
    document.getElementById('app').innerHTML = `
      <div style="text-align:center;padding:80px 20px;">
        <h2 style="color:var(--red)">Could not load report_data.json</h2>
        <p style="color:var(--text-dim);margin-top:12px;">
          Place this HTML file in the same directory as report_data.json and serve via HTTP.<br>
          <code style="color:var(--accent);">python3 -m http.server 8080</code>
        </p>
      </div>`;
    return null;
  }
}

function fmtWL(v) { return v >= 1e9 ? (v/1e9).toFixed(2)+'e9' : v >= 1e6 ? (v/1e6).toFixed(0)+'e6' : String(v); }
function fmtNum(v, d=3) { return v != null ? v.toFixed(d) : '\u2014'; }
function cls(v) { return v < 0 ? 'neg' : v > 0 ? 'pos' : ''; }
function congCls(v) { return v >= 1.15 ? 'hot' : v >= 1.0 ? 'warm' : 'cool'; }

function render(data) {
  const runs = data.runs;
  const winner = data.winner;
  const meta = data.metadata;
  const sorted = [...runs].sort((a,b) => b.timing.wns - a.timing.wns);
  const best = sorted[0];
  const runnerUp = sorted.length > 1 ? sorted[1] : null;
  const worst = sorted[sorted.length - 1];
  const gapPs = winner.closure_gap_ps;
  const gapBadge = gapPs <= 50 ? 'badge-amber' : gapPs <= 0 ? 'badge-green' : 'badge-red';
  const gapText = winner.wns >= 0 ? 'Timing met' : gapPs + ' ps from closure';
  const failClock = data.critical_path_pattern ? data.critical_path_pattern.failing_clock : 'N/A';
  const failEP = best.failing_clocks && best.failing_clocks.length ? best.failing_clocks[0] : null;

  // Find worst congestion run (for device map)
  const worstCong = [...runs].sort((a,b) => {
    const aMax = Math.max(a.congestion.global.north, a.congestion.global.south, a.congestion.global.east, a.congestion.global.west);
    const bMax = Math.max(b.congestion.global.north, b.congestion.global.south, b.congestion.global.east, b.congestion.global.west);
    return bMax - aMax;
  })[0];

  // Utilization summary
  const lutPcts = runs.map(r => r.utilization.lut_pct).filter(v => v != null);
  const lutMin = Math.min(...lutPcts), lutMax = Math.max(...lutPcts);
  const lutStr = lutMin === lutMax ? lutMin.toFixed(0) + '%' : lutMin.toFixed(0) + '\u2013' + lutMax.toFixed(0) + '%';

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-left">
        <h1>Multi-Run Implementation Analysis</h1>
        <div class="subtitle">${meta.device} &middot; ${meta.device_family || ''} &middot; ${meta.num_slrs ? meta.num_slrs+'-SLR SSI' : ''} &middot; ${meta.runs_analyzed} runs analyzed</div>
      </div>
      <div style="text-align:right"><span class="badge ${gapBadge}">${gapText}</span></div>
    </div>

    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">Winner</div>
        <div class="kpi-value green">${winner.run}</div>
        <div class="kpi-sub">WNS = ${winner.wns} ns</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Closure Gap</div>
        <div class="kpi-value ${winner.wns >= 0 ? 'green' : 'amber'}">${winner.wns >= 0 ? '0' : gapPs} ps</div>
        <div class="kpi-sub">${winner.wns >= 0 ? 'Timing closed' : 'Setup violation'}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Failing Clock</div>
        <div class="kpi-value" style="font-size:1rem;color:var(--cyan);">${failClock}</div>
        <div class="kpi-sub">${failEP ? failEP.failing_endpoints.toLocaleString()+' / '+failEP.total_endpoints.toLocaleString()+' endpoints' : ''}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Utilization (LUT)</div>
        <div class="kpi-value green">${lutStr}</div>
        <div class="kpi-sub">${lutMin === lutMax ? 'Consistent across all runs' : 'Varies across runs'}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Methodology Violations</div>
        <div class="kpi-value green">${runs.reduce((s,r) => s + (r.methodology_violations||0), 0)}</div>
        <div class="kpi-sub">${meta.runs_analyzed} runs checked</div>
      </div>
    </div>

    <div class="tab-bar" id="mainTabs">
      <div class="tab active" data-tab="timing">Timing</div>
      <div class="tab" data-tab="progression">PnR Progression</div>
      <div class="tab" data-tab="strategy">Strategy Impact</div>
      <div class="tab" data-tab="congestion">Congestion</div>
      <div class="tab" data-tab="patterns">Common Patterns</div>
      <div class="tab" data-tab="details">Run Details</div>
    </div>

    <!-- Timing -->
    <div class="tab-content active" id="tab-timing">
      <div class="grid-2">
        <div class="card"><h2>WNS by Run</h2><div class="chart-container"><canvas id="chartWNS"></canvas></div></div>
        <div class="card"><h2>TNS by Run (log scale)</h2><div class="chart-container"><canvas id="chartTNS"></canvas></div></div>
      </div>
      <div class="card card-full"><h2>Timing Summary \u2014 All Runs (sorted by WNS)</h2>
        <div style="overflow-x:auto;"><table>
          <thead><tr><th>Run</th><th>Strategy Group</th><th class="num">WNS (ns)</th><th class="num">TNS (ns)</th><th class="num">WHS (ns)</th><th class="num">THS (ns)</th><th class="num">WPWS (ns)</th><th>Status</th></tr></thead>
          <tbody id="timingTable"></tbody>
        </table></div>
      </div>
    </div>

    <!-- Progression -->
    <div class="tab-content" id="tab-progression">
      <div class="card card-full"><h2>Timing Progression: Post-Place \u2192 PhysOpt \u2192 Post-Route</h2>
        <div class="chart-container"><canvas id="chartProgression"></canvas></div>
      </div>
      <div class="grid-2">
        <div class="card"><h2>PhysOpt Recovery vs Route Degradation</h2><div class="chart-container"><canvas id="chartRecovery"></canvas></div></div>
        <div class="card"><h2>PhysOpt Iterations</h2><div class="chart-container"><canvas id="chartIters"></canvas></div></div>
      </div>
    </div>

    <!-- Strategy -->
    <div class="tab-content" id="tab-strategy">
      <div class="grid-2">
        <div class="card"><h2>WNS by Strategy Group</h2><div class="chart-container"><canvas id="chartStrategy"></canvas></div></div>
        <div class="card"><h2>Strategy Group Summary</h2>
          <div style="overflow-x:auto;"><table>
            <thead><tr><th>Strategy</th><th>Runs</th><th class="num">WNS Range</th><th>Verdict</th></tr></thead>
            <tbody id="strategyTable"></tbody>
          </table></div>
        </div>
      </div>
    </div>

    <!-- Congestion -->
    <div class="tab-content" id="tab-congestion">
      <div class="grid-3">
        <div class="card"><h2>${best.name} (Winner)</h2><div id="deviceMap0"></div></div>
        ${runnerUp ? `<div class="card"><h2>${runnerUp.name} (Runner-up)</h2><div id="deviceMap1"></div></div>` : ''}
        <div class="card"><h2>${worstCong.name} (Worst Cong.)</h2><div id="deviceMap2"></div></div>
      </div>
      <div class="grid-2">
        <div class="card"><h2>Global Congestion Heatmap</h2><div class="chart-container"><canvas id="chartCongHeat"></canvas></div></div>
        <div class="card"><h2>Wirelength by Run</h2><div class="chart-container"><canvas id="chartWL"></canvas></div></div>
      </div>
      <div id="detailedCongSection" style="display:none;">
        <div class="card card-full"><h2>Detailed Congestion Analysis (from report_design_analysis)</h2>
          <div style="font-size:.82rem;color:var(--text-dim);margin-bottom:12px;">Data discovered from run hooks / custom TCL — not all runs may have this data.</div>
          <div id="detailedCongContent"></div>
        </div>
      </div>
    </div>

    <!-- Patterns -->
    <div class="tab-content" id="tab-patterns">
      <div class="grid-2">
        <div class="card"><h2>Patterns to Adopt</h2><div id="adoptPatterns"></div></div>
        <div class="card"><h2>Patterns to Avoid</h2><div id="avoidPatterns"></div></div>
      </div>
      <div class="card card-full"><h2>Key Observations</h2><div id="obsPatterns"></div></div>
    </div>

    <!-- Run Detail Overlay (click on any run row) -->
    <div class="run-detail-overlay" id="runDetailOverlay">
      <div class="run-detail-panel">
        <button class="run-detail-close" id="runDetailClose">&times;</button>
        <div id="runDetailContent"></div>
      </div>
    </div>

    <!-- Details -->
    <div class="tab-content" id="tab-details">
      <div class="grid-2">
        <div class="card"><h2>Critical Observations</h2><div id="anomalies"></div></div>
        <div class="card"><h2>Recommended Next Steps</h2><div id="nextSteps"></div></div>
      </div>
      <div class="card card-full"><h2>Full Run Comparison</h2>
        <div style="overflow-x:auto;"><table>
          <thead><tr><th>Run</th><th>Strategy</th><th class="num">Place WNS</th><th class="num">PhysOpt WNS</th><th class="num">Route WNS</th>
            <th class="num">Recovery</th><th class="num">Degrad.</th><th class="num">Iters</th><th class="num">Cong Max</th><th class="num">WL</th></tr></thead>
          <tbody id="fullTable"></tbody>
        </table></div>
      </div>
    </div>

    <div class="footer">Generated from report_data.json &middot; ${(meta.analysis_date||'').split('T')[0]} &middot; Multi-Run Analysis</div>
  `;

  // Tab switching
  document.querySelectorAll('#mainTabs .tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('#mainTabs .tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  // Chart defaults
  Chart.defaults.color = '#8b90a0';
  Chart.defaults.borderColor = '#2e3347';
  Chart.defaults.font.family = 'Inter, sans-serif';
  Chart.defaults.font.size = 11;

  const runNames = sorted.map(r => r.name);

  // WNS bar
  new Chart(document.getElementById('chartWNS'), {
    type: 'bar',
    data: { labels: runNames, datasets: [{
      label: 'WNS (ns)', data: sorted.map(r => r.timing.wns),
      backgroundColor: sorted.map(r => r.name===winner.run ? 'rgba(74,222,128,.7)' : 'rgba(108,158,255,.5)'),
      borderColor: sorted.map(r => r.name===winner.run ? '#4ade80' : '#6c9eff'),
      borderWidth: 1, borderRadius: 4 }] },
    options: { responsive: true, plugins: { legend: { display: false },
      tooltip: { callbacks: { label: ctx => 'WNS: '+ctx.parsed.y.toFixed(3)+' ns' } } },
      scales: { y: { title: { display: true, text: 'WNS (ns)' }, grid: { color: '#1e2235' } },
                x: { ticks: { maxRotation: 45 }, grid: { display: false } } } }
  });

  // TNS bar (log)
  new Chart(document.getElementById('chartTNS'), {
    type: 'bar',
    data: { labels: runNames, datasets: [{
      label: '|TNS| (ns)', data: sorted.map(r => Math.abs(r.timing.tns)),
      backgroundColor: sorted.map(r => { const t=Math.abs(r.timing.tns);
        return t>10000 ? 'rgba(248,113,113,.6)' : t>1000 ? 'rgba(251,191,36,.5)' : 'rgba(108,158,255,.5)'; }),
      borderRadius: 4 }] },
    options: { responsive: true, plugins: { legend: { display: false } },
      scales: { y: { type: 'logarithmic', title: { display: true, text: '|TNS| (ns, log)' }, grid: { color: '#1e2235' } },
                x: { ticks: { maxRotation: 45 }, grid: { display: false } } } }
  });

  // Timing table — clickable rows
  document.getElementById('timingTable').innerHTML = sorted.map(r => {
    const w = r.name===winner.run;
    const st = r.timing.wns >= 0 ? '<span class="pos">MET</span>' :
               r.timing.whs < 0 ? '<span class="avoid">BOTH_FAIL</span>' : '<span class="neg">SETUP_FAIL</span>';
    return `<tr class="${w?'winner':''} clickable-row" data-run="${r.name}"><td>${w?'\u{1F3C6} ':''}${r.name}</td>
      <td style="color:var(--text-dim);font-size:.78rem">${r.strategy.strategy_group}</td>
      <td class="num ${cls(r.timing.wns)}">${fmtNum(r.timing.wns)}</td>
      <td class="num">${fmtNum(r.timing.tns,1)}</td>
      <td class="num ${r.timing.whs<0?'neg':''}">${fmtNum(r.timing.whs)}</td>
      <td class="num">${fmtNum(r.timing.ths)}</td>
      <td class="num">${fmtNum(r.timing.wpws)}</td><td>${st}</td></tr>`;
  }).join('');

  // Progression chart
  new Chart(document.getElementById('chartProgression'), {
    type: 'bar',
    data: { labels: runNames, datasets: [
      { label: 'Post-Place WNS', data: sorted.map(r => r.timing_progression.post_place_wns),
        backgroundColor: 'rgba(251,191,36,.5)', borderColor: '#fbbf24', borderWidth: 1, borderRadius: 3 },
      { label: 'Post-PhysOpt WNS', data: sorted.map(r => r.timing_progression.post_physopt_wns),
        backgroundColor: 'rgba(167,139,250,.5)', borderColor: '#a78bfa', borderWidth: 1, borderRadius: 3 },
      { label: 'Post-Route WNS', data: sorted.map(r => r.timing_progression.post_route_wns),
        backgroundColor: 'rgba(108,158,255,.5)', borderColor: '#6c9eff', borderWidth: 1, borderRadius: 3 }
    ] },
    options: { responsive: true, plugins: { legend: { position: 'top' } },
      scales: { y: { title: { display: true, text: 'WNS (ns)' }, grid: { color: '#1e2235' } },
                x: { ticks: { maxRotation: 45 }, grid: { display: false } } } }
  });

  // Recovery vs degradation scatter
  new Chart(document.getElementById('chartRecovery'), {
    type: 'scatter',
    data: { datasets: [{ label: 'Runs',
      data: sorted.map(r => ({ x: r.timing_progression.physopt_recovery, y: r.timing_progression.route_degradation, name: r.name })),
      backgroundColor: sorted.map(r => r.name===winner.run ? '#4ade80' : '#6c9eff'),
      pointRadius: sorted.map(r => r.name===winner.run ? 10 : 6), pointHoverRadius: 10 }] },
    options: { responsive: true, plugins: { legend: { display: false },
      tooltip: { callbacks: { label: ctx => ctx.raw.name+': Recovery='+ctx.raw.x.toFixed(3)+', Degrad='+ctx.raw.y.toFixed(3) } } },
      scales: { x: { title: { display: true, text: 'PhysOpt Recovery (ns)' }, grid: { color: '#1e2235' } },
                y: { title: { display: true, text: 'Route Degradation (ns)' }, grid: { color: '#1e2235' } } } }
  });

  // Iterations bar
  new Chart(document.getElementById('chartIters'), {
    type: 'bar',
    data: { labels: runNames, datasets: [{ label: 'PhysOpt Iterations',
      data: sorted.map(r => r.timing_progression.physopt_iterations),
      backgroundColor: sorted.map(r => r.timing_progression.physopt_iterations >= 100 ? 'rgba(167,139,250,.6)' : 'rgba(108,158,255,.4)'),
      borderRadius: 4 }] },
    options: { responsive: true, plugins: { legend: { display: false } },
      scales: { y: { title: { display: true, text: 'Iterations' }, grid: { color: '#1e2235' } },
                x: { ticks: { maxRotation: 45 }, grid: { display: false } } } }
  });

  // Strategy group chart
  const sg = data.strategy_groups || [];
  if (sg.length && document.getElementById('chartStrategy')) {
    new Chart(document.getElementById('chartStrategy'), {
      type: 'bar',
      data: { labels: sg.map(s => s.name.length > 30 ? s.name.slice(0,28)+'\u2026' : s.name),
        datasets: [{ label: 'Best WNS (ns)', data: sg.map(s => s.wns_range[0]),
          backgroundColor: sg.map(s => s.verdict==='Winner' ? 'rgba(74,222,128,.7)' :
            (s.verdict&&s.verdict.includes('Avoid') ? 'rgba(248,113,113,.6)' : 'rgba(108,158,255,.5)')),
          borderRadius: 4 }] },
      options: { indexAxis: 'y', responsive: true, plugins: { legend: { display: false } },
        scales: { x: { title: { display: true, text: 'WNS (ns)' }, grid: { color: '#1e2235' } },
                  y: { grid: { display: false } } } }
    });
  }

  // Strategy table
  document.getElementById('strategyTable').innerHTML = sg.map(s => {
    const vCls = s.verdict==='Winner' ? 'good' : (s.verdict&&s.verdict.includes('Avoid') ? 'avoid' : '');
    return `<tr><td>${s.name}</td><td style="color:var(--text-dim)">${s.runs.join(', ')}</td>
      <td class="num">${s.wns_range[0].toFixed(3)}</td><td class="${vCls}">${s.verdict||'\u2014'}</td></tr>`;
  }).join('');

  // Device maps
  function renderDeviceMap(id, run) {
    const el = document.getElementById(id);
    if (!el || !run || !run.congestion.per_slr || !run.congestion.per_slr.length) {
      if (el) el.innerHTML = '<div style="color:var(--text-dim);text-align:center;padding:20px;">No per-SLR data</div>';
      return;
    }
    const numSlrs = meta.num_slrs || run.congestion.per_slr.length;
    const slrs = [...run.congestion.per_slr].sort((a,b) => {
      const n = s => parseInt(s.slr.replace(/\D/g,''));
      return n(b) - n(a);  // top SLR first
    });
    el.innerHTML = `<div class="device-map">${slrs.map((s,i) => {
      const dirs = [{label:'N',val:s.north},{label:'S',val:s.south},{label:'E',val:s.east},{label:'W',val:s.west}];
      const pos = i===0 ? ' (top)' : i===slrs.length-1 ? ' (bottom)' : '';
      return `<div class="slr-box"><div class="slr-label">${s.slr}${pos}</div>
        <div class="slr-grid">${dirs.map(d => `<div class="slr-val ${congCls(d.val)}">${d.label}=${d.val.toFixed(2)}${d.val>=1.15?' \u{1F525}':d.val>=1.05?' \u26A0':''}</div>`).join('')}</div>
        <div style="font-size:.7rem;color:var(--text-dim);margin-top:3px;">WL: ${fmtWL(s.wirelength)}</div></div>`;
    }).join('')}</div>
    <div style="text-align:center;margin-top:8px;font-size:.78rem;color:var(--text-dim);">
      Global: N=${run.congestion.global.north} S=${run.congestion.global.south} E=${run.congestion.global.east} W=${run.congestion.global.west} &middot; WL=${fmtWL(run.congestion.global.wirelength)}</div>`;
  }
  const findRun = name => runs.find(r => r.name === name);
  renderDeviceMap('deviceMap0', findRun(best.name));
  if (runnerUp) renderDeviceMap('deviceMap1', findRun(runnerUp.name));
  renderDeviceMap('deviceMap2', findRun(worstCong.name));

  // Congestion heatmap (bubble)
  const congDirs = ['north','south','east','west'];
  const congData = [];
  sorted.forEach((r, ri) => { congDirs.forEach((dir, di) => {
    const v = r.congestion.global[dir];
    congData.push({x:ri, y:di, r:Math.max(3,(v-0.8)*30), v:v, run:r.name, dir:dir});
  }); });
  new Chart(document.getElementById('chartCongHeat'), {
    type: 'bubble',
    data: { datasets: [{ label: 'Congestion',
      data: congData.map(d => ({x:d.x, y:d.y, r:d.r})),
      backgroundColor: congData.map(d => d.v>=1.15?'rgba(248,113,113,.7)':d.v>=1.0?'rgba(251,191,36,.5)':'rgba(74,222,128,.3)') }] },
    options: { responsive: true, plugins: { legend: { display: false },
      tooltip: { callbacks: { label: ctx => { const d=congData[ctx.dataIndex]; return d.run+' '+d.dir.toUpperCase()+': '+d.v.toFixed(2); } } } },
      scales: { x: { type:'linear', min:-.5, max:sorted.length-.5,
                     ticks: { callback: v => runNames[Math.round(v)]||'' , maxRotation: 45 }, grid:{display:false} },
                y: { type:'linear', min:-.5, max:3.5,
                     ticks: { callback: v =>['N','S','E','W'][Math.round(v)]||'' }, grid:{color:'#1e2235'} } } }
  });

  // Wirelength bar
  new Chart(document.getElementById('chartWL'), {
    type: 'bar',
    data: { labels: runNames, datasets: [{ label: 'Wirelength',
      data: sorted.map(r => r.congestion.global.wirelength / 1e9),
      backgroundColor: sorted.map(r => { const wl=r.congestion.global.wirelength;
        return wl>1.4e9?'rgba(248,113,113,.6)':wl>1.3e9?'rgba(251,191,36,.5)':'rgba(108,158,255,.4)'; }),
      borderRadius: 4 }] },
    options: { responsive: true, plugins: { legend: { display: false } },
      scales: { y: { title: { display: true, text: 'Wirelength (\u00D710\u2079)' }, grid: { color: '#1e2235' } },
                x: { ticks: { maxRotation: 45 }, grid: { display: false } } } }
  });

  // ===== Detailed Congestion (OPTIONAL — from report_design_analysis) =====
  const runsWithDetail = runs.filter(r => r.detailed_congestion);
  if (runsWithDetail.length > 0) {
    document.getElementById('detailedCongSection').style.display = 'block';
    const dcEl = document.getElementById('detailedCongContent');
    let dcHtml = `<div style="margin-bottom:8px;font-size:.82rem;"><strong>${runsWithDetail.length}/${runs.length}</strong> runs have detailed congestion data.</div>`;
    runsWithDetail.forEach(r => {
      const dc = r.detailed_congestion;
      const w = r.name === winner.run;
      dcHtml += `<div class="phase-block" style="margin-bottom:16px;">
        <div class="phase-label" style="color:${w?'var(--green)':'var(--accent)'}">${w?'\u{1F3C6} ':''}${r.name}${dc.rent_exponent!=null ? ' &middot; Rent='+dc.rent_exponent : ''}</div>`;
      // Source commands
      if (dc.source_commands && dc.source_commands.length) {
        dcHtml += `<div style="font-size:.75rem;color:var(--text-dim);margin-bottom:8px;">Source: ${dc.source_commands.map(c => '<code style="color:var(--cyan)">report_design_analysis '+escapeHtml(c.flags)+'</code>').join(', ')}</div>`;
      }
      // Top congested modules
      if (dc.top_congested_modules && dc.top_congested_modules.length) {
        const maxPct = Math.max(...dc.top_congested_modules.map(m => m.contribution_pct));
        dcHtml += `<div style="margin-bottom:8px;"><strong style="font-size:.82rem;">Top Congested Modules</strong>
          <table class="detail-cong-table"><thead><tr><th>Module</th><th>Contribution</th><th></th></tr></thead><tbody>`;
        dc.top_congested_modules.forEach(m => {
          const barW = Math.max(5, (m.contribution_pct / maxPct) * 100);
          dcHtml += `<tr><td style="font-family:monospace;font-size:.75rem;">${escapeHtml(m.module)}</td>
            <td class="num">${m.contribution_pct.toFixed(1)}%</td>
            <td style="width:40%;"><div class="module-bar" style="width:${barW}%"></div></td></tr>`;
        });
        dcHtml += `</tbody></table></div>`;
      }
      // Per-clock-region congestion (show top hotspots only)
      if (dc.per_clock_region && dc.per_clock_region.length) {
        const hotRegions = dc.per_clock_region
          .map(cr => ({...cr, maxDir: Math.max(cr.north||0, cr.south||0, cr.east||0, cr.west||0)}))
          .sort((a,b) => b.maxDir - a.maxDir).slice(0, 10);
        dcHtml += `<div style="margin-bottom:8px;"><strong style="font-size:.82rem;">Hottest Clock Regions</strong> (top ${hotRegions.length})
          <table class="detail-cong-table"><thead><tr><th>Region</th><th class="num">N</th><th class="num">S</th><th class="num">E</th><th class="num">W</th></tr></thead><tbody>`;
        hotRegions.forEach(cr => {
          dcHtml += `<tr><td>${cr.region}</td>
            <td class="num ${congCls(cr.north||0)}">${cr.north||0}</td>
            <td class="num ${congCls(cr.south||0)}">${cr.south||0}</td>
            <td class="num ${congCls(cr.east||0)}">${cr.east||0}</td>
            <td class="num ${congCls(cr.west||0)}">${cr.west||0}</td></tr>`;
        });
        dcHtml += `</tbody></table></div>`;
      }
      // Complexity
      if (dc.complexity) {
        dcHtml += `<div style="font-size:.82rem;">Complexity: avg=${dc.complexity.avg_logic_levels} levels, max=${dc.complexity.max_logic_levels} levels</div>`;
      }
      dcHtml += `</div>`;
    });
    dcEl.innerHTML = dcHtml;
  }

  // Anomalies (from JSON)
  const anomalies = data.anomalies || [];
  document.getElementById('anomalies').innerHTML = anomalies.length
    ? anomalies.map(a => `<div class="anomaly-item ${a.severity||''}">${a.text}</div>`).join('')
    : '<div style="color:var(--text-dim);padding:12px;">No anomalies detected.</div>';

  // Next steps (from JSON)
  const steps = (data.next_steps || []).sort((a,b) => (a.priority||99) - (b.priority||99));
  document.getElementById('nextSteps').innerHTML = steps.length
    ? steps.map((s,i) => `<div class="next-step"><strong>${i+1}.</strong> ${s.text}</div>`).join('')
    : '<div style="color:var(--text-dim);padding:12px;">No recommendations.</div>';

  // Full comparison table — clickable rows
  document.getElementById('fullTable').innerHTML = sorted.map(r => {
    const p = r.timing_progression, c = r.congestion.global;
    const maxC = Math.max(c.north, c.south, c.east, c.west);
    const w = r.name===winner.run;
    return `<tr class="${w?'winner':''} clickable-row" data-run="${r.name}"><td>${w?'\u{1F3C6} ':''}${r.name}</td>
      <td style="font-size:.75rem;color:var(--text-dim)">${r.strategy.strategy_group}</td>
      <td class="num">${fmtNum(p.post_place_wns)}</td><td class="num">${fmtNum(p.post_physopt_wns)}</td>
      <td class="num ${cls(r.timing.wns)}">${fmtNum(p.post_route_wns)}</td>
      <td class="num pos">${fmtNum(p.physopt_recovery)}</td>
      <td class="num ${p.route_degradation>=0?'pos':'neg'}">${p.route_degradation>=0?'+':''}${fmtNum(p.route_degradation)}</td>
      <td class="num">${p.physopt_iterations}</td>
      <td class="num ${maxC>=1.1?'neg':maxC>=1.0?'':'pos'}">${maxC.toFixed(2)}</td>
      <td class="num">${fmtWL(c.wirelength)}</td></tr>`;
  }).join('');

  // ===== Run Detail Panel (click on any run row) =====
  function showRunDetail(runName) {
    const r = runs.find(x => x.name === runName);
    if (!r) return;
    const p = r.timing_progression;
    const tc = r.tcl_commands || {};
    const c = r.congestion.global;
    const w = r.name === winner.run;
    const phases = [
      { label: 'opt_design', cmd: tc.opt_design || 'opt_design (default)', wnsIn: null, wnsOut: p.post_place_wns, note: null },
      { label: 'place_design', cmd: tc.place_design || 'place_design (default)',
        wnsIn: null, wnsOut: p.post_place_wns,
        note: `Post-Place WNS: ${fmtNum(p.post_place_wns)} ns &middot; TNS: ${fmtNum(p.post_place_tns,1)} ns` },
      { label: 'phys_opt_design', cmd: tc.phys_opt_design || 'phys_opt_design',
        wnsIn: p.post_place_wns, wnsOut: p.post_physopt_wns,
        note: `Recovery: ${fmtNum(p.physopt_recovery)} ns &middot; ${p.physopt_iterations} iterations &middot; Post-PhysOpt WNS: ${fmtNum(p.post_physopt_wns)} ns` },
      { label: 'route_design', cmd: tc.route_design || 'route_design',
        wnsIn: p.post_physopt_wns, wnsOut: p.post_route_wns,
        note: `Route Degradation: ${p.route_degradation >= 0 ? '+' : ''}${fmtNum(p.route_degradation)} ns &middot; Post-Route WNS: ${fmtNum(p.post_route_wns)} ns` },
    ];
    if (tc.post_route_phys_opt) {
      phases.push({ label: 'post-route phys_opt', cmd: tc.post_route_phys_opt,
        wnsIn: p.post_route_wns, wnsOut: null,
        note: 'Additional phys_opt pass on routed design' });
    }

    const anomaliesForRun = (r.anomalies && r.anomalies.length)
      ? r.anomalies.map(a => `<div class="anomaly-item ${a.severity||''}">${a.text}</div>`).join('')
      : '';
    const holdStatus = r.timing.whs < 0
      ? `<span class="neg" style="font-weight:700">HOLD FAILURE: WHS=${fmtNum(r.timing.whs)} ns</span>`
      : `<span class="pos">Hold met: WHS=${fmtNum(r.timing.whs)} ns</span>`;

    document.getElementById('runDetailContent').innerHTML = `
      <h2 style="color:${w?'var(--green)':'var(--accent)'}">${w?'\u{1F3C6} ':''}${r.name}${w?' (Winner)':''}</h2>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;">
        <div><span class="phase-metric-label">Final WNS</span><br><span class="${cls(r.timing.wns)}" style="font-size:1.3rem;font-weight:700">${fmtNum(r.timing.wns)} ns</span></div>
        <div><span class="phase-metric-label">Final TNS</span><br><span style="font-size:1.1rem">${fmtNum(r.timing.tns,1)} ns</span></div>
        <div><span class="phase-metric-label">Hold Status</span><br>${holdStatus}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:16px;font-size:.82rem;">
        <div><span class="phase-metric-label">LUTs</span><br>${r.utilization.luts.toLocaleString()} (${r.utilization.lut_pct}%)</div>
        <div><span class="phase-metric-label">FFs</span><br>${r.utilization.ffs.toLocaleString()}</div>
        <div><span class="phase-metric-label">BRAM</span><br>${r.utilization.bram}</div>
        <div><span class="phase-metric-label">Congestion</span><br>N=${c.north} S=${c.south} E=${c.east} W=${c.west}</div>
      </div>
      <h2 style="font-size:1rem;margin-top:20px;">Implementation Phases (TCL Commands)</h2>
      ${phases.map(ph => `
        <div class="phase-block">
          <div class="phase-label">${ph.label}</div>
          <div class="phase-cmd">${escapeHtml(ph.cmd)}</div>
          ${ph.note ? `<div style="margin-top:8px;font-size:.82rem;color:var(--text-dim);">${ph.note}</div>` : ''}
        </div>
      `).join('')}
      ${anomaliesForRun ? `<h2 style="font-size:1rem;margin-top:16px;color:var(--red);">Anomalies</h2>${anomaliesForRun}` : ''}
      ${r.detailed_congestion ? (() => {
        const dc = r.detailed_congestion;
        let dcHtml = '<h2 style="font-size:1rem;margin-top:16px;color:var(--cyan);">Detailed Congestion Analysis</h2>';
        if (dc.rent_exponent != null) dcHtml += '<div style="font-size:.85rem;margin-bottom:8px;">Rent Exponent: <strong>'+dc.rent_exponent+'</strong></div>';
        if (dc.top_congested_modules && dc.top_congested_modules.length) {
          dcHtml += '<div style="font-size:.82rem;margin-bottom:4px;font-weight:600;">Top Congested Modules:</div>';
          dc.top_congested_modules.slice(0,5).forEach(m => {
            dcHtml += '<div style="font-size:.8rem;padding:2px 0;"><code style="color:var(--cyan)">'+escapeHtml(m.module)+'</code> — '+m.contribution_pct.toFixed(1)+'%</div>';
          });
        }
        if (dc.complexity) {
          dcHtml += '<div style="font-size:.82rem;margin-top:8px;">Logic Levels: avg='+dc.complexity.avg_logic_levels+', max='+dc.complexity.max_logic_levels+'</div>';
        }
        return dcHtml;
      })() : ''}
      <div style="margin-top:16px;font-size:.78rem;color:var(--text-dim);">Strategy group: ${r.strategy.strategy_group}</div>
    `;
    document.getElementById('runDetailOverlay').classList.add('open');
  }

  function escapeHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

  // Close overlay
  document.getElementById('runDetailClose').addEventListener('click', () => {
    document.getElementById('runDetailOverlay').classList.remove('open');
  });
  document.getElementById('runDetailOverlay').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) document.getElementById('runDetailOverlay').classList.remove('open');
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') document.getElementById('runDetailOverlay').classList.remove('open');
  });

  // Attach click listeners to all clickable rows
  document.querySelectorAll('.clickable-row').forEach(row => {
    row.addEventListener('click', () => showRunDetail(row.dataset.run));
  });

  // ===== Common Patterns Tab =====
  const patterns = data.common_patterns || {};
  function renderPatternCards(items, type, containerId) {
    const el = document.getElementById(containerId);
    if (!el) return;
    if (!items || !items.length) {
      el.innerHTML = '<div style="color:var(--text-dim);padding:12px;">No patterns found.</div>';
      return;
    }
    el.innerHTML = items.map(p => `
      <div class="pattern-card ${type}">
        <div class="pattern-header">
          <div style="flex:1;"><span style="font-weight:600;font-size:.92rem;color:var(--text);">${escapeHtml(p.pattern)}</span></div>
          ${p.phase ? `<span class="pattern-phase">${p.phase}</span>` : ''}
          ${p.verdict ? `<span class="pattern-verdict ${type}">${p.verdict}</span>` : ''}
        </div>
        ${p.frequency ? `<div class="pattern-freq">${escapeHtml(p.frequency)}</div>` : ''}
        <div class="pattern-evidence">${escapeHtml(p.evidence)}</div>
        ${p.recommendation ? `<div style="margin-top:6px;font-size:.82rem;color:var(--accent);">\u2192 ${escapeHtml(p.recommendation)}</div>` : ''}
      </div>
    `).join('');
  }
  renderPatternCards(patterns.adopt, 'adopt', 'adoptPatterns');
  renderPatternCards(patterns.avoid, 'avoid', 'avoidPatterns');
  renderPatternCards(patterns.observations, 'observation', 'obsPatterns');
}

loadData().then(data => { if (data) render(data); });
</script>
</body>
</html>
